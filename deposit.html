<!DOCTYPE html>
<html>
<body>

<h1>Deposit</h1>

<input id="amount" type="number" placeholder="Amount">

<button onclick="send()">Submit</button>

<script>
function send() {
  fetch("/deposit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      amount: document.getElementById("amount").value
    })
  });

  alert("Deposit sent");
}
</script>

</body>
</html>
