<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PlayZone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <div>🎮 PlayZone</div>
  <div id="info">Loading...</div>
</header>

<div class="container">

  <div class="card">
    💰 Balance
    <h2 id="balance">0</h2>
  </div>

  <div class="card">
    ⭐ VIP Level
    <h2 id="vip">0</h2>
  </div>

  <div class="card">
    🎯 Task
    <button onclick="completeTask()">Complete Task (+1)</button>
  </div>

  <div class="card">
    📥 Deposit
    <input id="dep" placeholder="Amount">
    <button onclick="deposit()">Deposit</button>
  </div>

  <div class="card">
    📤 Withdraw
    <input id="with" placeholder="Amount">
    <button onclick="withdraw()">Withdraw</button>
  </div>

</div>

<script>
async function loadUser() {
  const res = await fetch("/api/user");
  const data = await res.json();

  document.getElementById("balance").innerText = data.balance;
  document.getElementById("vip").innerText = data.vip;
  document.getElementById("info").innerText =
    "Balance: " + data.balance + " | VIP: " + data.vip;
}

async function completeTask() {
  await fetch("/api/task/complete", { method: "POST" });
  loadUser();
}

async function deposit() {
  let amount = document.getElementById("dep").value;

  await fetch("/api/deposit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  loadUser();
}

async function withdraw() {
  let amount = document.getElementById("with").value;

  await fetch("/api/withdraw", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  loadUser();
}

loadUser();
</script>

</body>
</html>
